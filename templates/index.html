<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>BRNO TRIP LIST</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    .header {
      padding: 15px;
      font-size: 18px;
      background: #111a2e;
    }

    button {
      margin: 10px 15px;
      padding: 8px 12px;
      border: none;
      background: #38bdf8;
      color: black;
      border-radius: 6px;
      cursor: pointer; 
    }

    .container {
      padding: 15px;
    }

    .line {
      background: #111a2e;
      margin-bottom: 10px;
      border-radius: 8px;
      padding: 10px;
    }

    .line-title {
      font-weight: bold;
      color: #38bdf8;
      margin-bottom: 6px;
    }

    .vehicle {
      font-family: monospace;
      color: #cbd5e1;
      padding: 2px 0;
    }
  </style>
</head>

<body>

<div class="header">
  BRNO TRIP LIST
</div>

<button onclick="load()">Frissítés</button>

<div class="container" id="container"></div>

<script>
async function load() {
  const res = await fetch("/api/lines");
  const data = await res.json();

  const container = document.getElementById("container");
  container.innerHTML = "";

  data.forEach(line => {
    const div = document.createElement("div");
    div.className = "line";

    let html = `<div class="line-title">Line ${line.line}</div>`;

    if (line.vehicles && line.vehicles.length > 0) {
      line.vehicles.forEach(v => {
        html += `<div class="vehicle">${v}</div>`;
      });
    } else {
      html += `<div class="vehicle">— nincs jármű —</div>`;
    }

    div.innerHTML = html;
    container.appendChild(div);
  });
}

window.addEventListener("load", load);
setInterval(load, 5000);
</script>

</body>
</html>
